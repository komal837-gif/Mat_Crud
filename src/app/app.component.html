
<mat-sidenav-container fullscreen>
    <mat-sidenav #sidenav>
        <mat-nav-list (click)="sidenav.close()">
            <a mat-list-item routerLink="/home">Home</a>
            <a mat-list-item routerLink="/posts">post</a>
            <a mat-list-item routerLink="/products">product</a>
            <a mat-list-item routerLink="/users">Users</a>
        </mat-nav-list>
    </mat-sidenav>
    <mat-toolbar color="primary">
  <button (click)="sidenav.open()" mat-icon-button class="example-icon" aria-label="Example icon-button with menu icon">
    <mat-icon>apps</mat-icon>
  </button>
</mat-toolbar>

    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <router-outlet></router-outlet>
                 
            </div>
        </div>
    </div>

</mat-sidenav-container>

<div class="loader" *ngIf="isLoading">
  <mat-spinner></mat-spinner>
</div>
