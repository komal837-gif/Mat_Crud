
<main class="main">
    <div class="card">
        <div class="card-body">
            <h2>{{allReadyHasAccount ? 'Login' : 'SignUp'}} </h2>
            
            <ng-container *ngIf="allReadyHasAccount">
                <form #loginForm="ngForm" (ngSubmit)="onLogin()">
                    <div class="form-group">
                        <label for="email">Email<sup>*</sup></label>
                        <input ngModel name="email" #email="ngModel" type="text" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="password">password<sup>*</sup></label>
                        <input ngModel name="password" #email="ngModel" type="text" class="form-control">
                    </div>
                    <button class="w-100" mat-raised-button color="primary">Login</button>
                    <a (click)="allReadyHasAccount=false" class="btn btn-link" href="javascript:;">Dont Have Account</a>
                </form>
            </ng-container>
            <ng-container *ngIf="!allReadyHasAccount">
                <form #signUpForm="ngForm" (ngSubmit)="onSignUp()">
                    <div class="form-group">
                        <label for="email">Email<sup>*</sup></label>
                        <input ngModel name="email" #email="ngModel" type="text" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="password">password<sup>*</sup></label>
                        <input ngModel name="password" #email="ngModel" type="text" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="userRole">userRole<sup>*</sup></label>
                        <select name="userRole" class="form-control" #userRole="ngModel" ngModel>
                            <option value="user">user</option>
                             <option value="admin">admin</option>
                              <option value="buyer">buyer</option>
                         </select>
                    </div>
                    <button class="w-100" mat-raised-button color="primary">SignUp</button>
                    <a (click)="allReadyHasAccount=true" class="btn btn-link" href="javascript:;">Already Has Account</a>
                </form>
            </ng-container>
        </div>
    </div>
</main>
