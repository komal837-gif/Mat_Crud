

<div class="row">
    <div class="col-12 font-weight-bold text-center mb-5">
      Add Post
        <button 
        (click)="onAdd()"
        mat-mini-fab color="accent"><mat-icon>add</mat-icon></button>

    <div class="col-md-6 offset-md-3 mb-4 d-flex flex-column-reverse">
        <app-post-card  *ngFor="let post of postsArr" [postObj]="post"></app-post-card>
    </div>
</div>
