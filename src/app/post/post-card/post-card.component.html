
<mat-card>
    <mat-card-title>
        <h2>{{postObj.title}}</h2>
    </mat-card-title>
    <mat-card-content>
        <p>{{postObj.body}}</p>
    </mat-card-content>
    <mat-card-actions class="d-flex justify-content-between align-items-center">
        <button (click)="onEdit()" mat-raised-button color="primary">Edit</button>
        <button (click)="onRemove()" mat-raised-button color="warn">Remove</button>
    </mat-card-actions>
</mat-card>
